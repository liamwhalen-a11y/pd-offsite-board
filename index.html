<style>
  :root{color-scheme:light}
  body{margin:0;font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#1a1a1a;color:#141414}
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gcard{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.35);padding:32px 28px;max-width:390px;width:100%;text-align:center;border-top:4px solid #f5c518}

  .gcard h1{font-size:19px;margin:14px 0 6px;font-weight:600}
  .gcard p{font-size:13px;color:#666;margin:0 0 18px}
  .gcard input{width:100%;border:1.5px solid #d4d4ce;border-radius:10px;padding:11px 12px;font:inherit;font-size:15px;margin-bottom:12px}
  .gcard input:focus{outline:2px solid #f5c518;border-color:#f5c518}
  .gcard button{width:100%;border:0;background:#f5c518;color:#1a1a1a;font:inherit;font-weight:600;font-size:15px;border-radius:10px;padding:11px;cursor:pointer}
  .gerr{color:#c8402f;font-size:12.5px;min-height:16px;margin-top:10px;font-weight:600}
  #app{display:none}
</style>
</head>
<body>
<div id="gate">
  <form class="gcard" id="gForm">
    <div class="glock">&#128274;</div>
    <h1>Protected board</h1>
    <p>Enter the passphrase to view. Shared with the team for the offsite.</p>
    <input id="gPw" type="password" placeholder="Passphrase" autocomplete="off" autofocus>
    <button type="submit">Unlock</button>
    <div class="gerr" id="gErr"></div>
  </form>
</div>

function b64buf(b){var bin=atob(b);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function unlock(pw){
  var norm=pw.trim().replace(/\s+/g,' ').toLowerCase();
  var baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(norm),{name:'PBKDF2'},false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64buf(PAY.s),iterations:PAY.it,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64buf(PAY.iv)},key,b64buf(PAY.ct));
  var obj=JSON.parse(new TextDecoder().decode(pt));
  var st=document.createElement('style');st.textContent=obj.css;document.head.appendChild(st);
  document.getElementById('app').innerHTML=obj.html;
  var sc=document.createElement('script');sc.textContent=obj.js;document.body.appendChild(sc);
  var g=document.getElementById('gate');if(g)g.remove();
  document.getElementById('app').style.display='block';
}
document.getElementById('gForm').addEventListener('submit',function(e){
  e.preventDefault();
  var err=document.getElementById('gErr');err.textContent='';
  if(!(window.crypto&&window.crypto.subtle)){err.textContent='Open this page via its https link, not as a local file.';return;}
  unlock(document.getElementById('gPw').value).catch(function(){err.textContent='Incorrect passphrase. Try again.';});
});
